<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <h1>Expense Tracker</h1>

    <form action="/save" method="post">

        <input type="text"
               name="category"
               placeholder="Category"
               required>
        <br><br>

        <input type="number"
               step="0.01"
               name="amount"
               placeholder="Amount"
               required>
        <br><br>

        <input type="text"
               name="description"
               placeholder="Description"
               required>
        <br><br>

        <button type="submit">Add Expense</button>

    </form>

    <hr>

    <h2>Expenses</h2>

    <table border="1">

        <tr>
            <th>Category</th>
            <th>Amount</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

        <tr th:each="expense : ${expenses}">
    <td th:text="${expense.category}"></td>
    <td th:text="${expense.amount}"></td>
    <td th:text="${expense.description}"></td>

    <td>
        <a th:href="@{/delete/{id}(id=${expense.id})}">
            Delete
        </a>
    </td>
</tr>

    </table>
    <h2>Total Expenses: ₹ <span th:text="${total}"></span></h2>

</body>
</html>
